<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garmin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --accent: #6c8cff;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 20px;
  }
  .snapshot {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .stat-unit {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 400;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 12px;
    margin-top: 8px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .chart-card h3 {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .chart-wrapper {
    position: relative;
    height: 180px;
  }
  .activity {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .activity-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .activity-name {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .activity-type {
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(108,140,255,0.12);
    padding: 2px 8px;
    border-radius: 6px;
    text-transform: capitalize;
  }
  .activity-date {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .activity-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .activity-stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
  }
  .activity-stat-value {
    font-size: 1rem;
    font-weight: 600;
  }
  .no-data {
    text-align: center;
    color: var(--muted);
    padding: 40px 16px;
    font-size: 0.9rem;
  }
  .color-green { color: var(--green); }
  .color-accent { color: var(--accent); }
  .color-orange { color: var(--orange); }
  .color-red { color: var(--red); }
  .color-purple { color: var(--purple); }
  .run-section {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .run-section-title {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .run-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .run-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .hr-zones {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .hr-zone-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
  }
  .hr-zone-label {
    width: 20px;
    text-align: right;
    color: var(--muted);
    font-size: 0.65rem;
    flex-shrink: 0;
  }
  .hr-zone-bar-bg {
    flex: 1;
    height: 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .hr-zone-bar {
    height: 100%;
    border-radius: 3px;
    min-width: 2px;
  }
  .hr-zone-time {
    width: 40px;
    text-align: right;
    color: var(--muted);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Garmin Dashboard</h1>
<p class="subtitle" id="syncTime">Loading...</p>

<div id="snapshot" class="snapshot"></div>

<p class="section-title">Trends</p>
<div class="chart-card">
  <h3>HRV &amp; Resting HR</h3>
  <div class="chart-wrapper"><canvas id="hrvChart"></canvas></div>
</div>
<div class="chart-card">
  <h3>Sleep</h3>
  <div class="chart-wrapper"><canvas id="sleepChart"></canvas></div>
</div>
<div class="chart-card">
  <h3>Steps</h3>
  <div class="chart-wrapper"><canvas id="stepsChart"></canvas></div>
</div>

<p class="section-title">Recent Activities</p>
<div id="activities"></div>

<script>
const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: true, position: 'top', labels: { color: '#8b8fa3', boxWidth: 10, font: { size: 11 } } }
  },
  scales: {
    x: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
    y: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
  }
};

function formatPace(speedMs) {
  if (!speedMs || speedMs <= 0) return '--';
  const paceSeconds = 1000 / speedMs;
  const mins = Math.floor(paceSeconds / 60);
  const secs = Math.round(paceSeconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function formatDuration(seconds) {
  if (!seconds) return '--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.round(seconds % 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m ${s}s`;
}

function formatDistance(meters) {
  if (!meters) return '--';
  return (meters / 1000).toFixed(2);
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}

function formatDateTime(dateStr) {
  const d = new Date(dateStr.replace(' ', 'T'));
  return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit' });
}

function formatSplitPace(seconds) {
  if (!seconds) return '--';
  const mins = Math.floor(seconds / 60);
  const secs = Math.round(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function formatZoneTime(seconds) {
  if (!seconds || seconds < 1) return '0s';
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  if (m > 0) return `${m}m`;
  return `${s}s`;
}

function renderHrZones(a) {
  const zones = [
    { label: 'Z1', seconds: a.hrTimeInZone_1 || 0, color: '#94a3b8' },
    { label: 'Z2', seconds: a.hrTimeInZone_2 || 0, color: '#6c8cff' },
    { label: 'Z3', seconds: a.hrTimeInZone_3 || 0, color: '#4ade80' },
    { label: 'Z4', seconds: a.hrTimeInZone_4 || 0, color: '#fb923c' },
    { label: 'Z5', seconds: a.hrTimeInZone_5 || 0, color: '#f87171' },
  ];
  const maxSec = Math.max(...zones.map(z => z.seconds), 1);
  return zones.map(z => {
    const pct = Math.max((z.seconds / maxSec) * 100, 0);
    return `<div class="hr-zone-row">
      <span class="hr-zone-label">${z.label}</span>
      <div class="hr-zone-bar-bg"><div class="hr-zone-bar" style="width:${pct}%;background:${z.color}"></div></div>
      <span class="hr-zone-time">${formatZoneTime(z.seconds)}</span>
    </div>`;
  }).join('');
}

async function init() {
  let data;
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('Failed to load data');
    data = await resp.json();
  } catch (e) {
    document.getElementById('syncTime').textContent = 'Could not load data.json';
    document.getElementById('snapshot').innerHTML = '<div class="no-data" style="grid-column:1/-1">No data available. Run the sync script first.</div>';
    return;
  }

  // Sync time
  const syncDate = new Date(data.last_sync);
  document.getElementById('syncTime').textContent = `Last sync: ${syncDate.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit' })}`;

  // Snapshot — most recent wellness day
  const wellness = data.wellness || [];
  const sorted = [...wellness].sort((a, b) => b.date.localeCompare(a.date));
  const today = sorted[0];

  if (today) {
    document.getElementById('snapshot').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">HRV</div>
        <div class="stat-value color-accent">${today.hrvOvernight ?? '--'} <span class="stat-unit">ms</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Resting HR</div>
        <div class="stat-value color-red">${today.restingHR ?? '--'} <span class="stat-unit">bpm</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sleep</div>
        <div class="stat-value color-purple">${today.sleepHours ?? '--'} <span class="stat-unit">hrs</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sleep Score</div>
        <div class="stat-value color-green">${today.sleepScore ?? '--'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Steps</div>
        <div class="stat-value color-orange">${today.steps != null ? today.steps.toLocaleString() : '--'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Date</div>
        <div class="stat-value" style="font-size:1rem; padding-top:4px">${formatDate(today.date)}</div>
      </div>
    `;
  }

  // Charts — data chronological (oldest first)
  const chronological = [...sorted].reverse();
  const labels = chronological.map(w => formatDate(w.date));

  // HRV + Resting HR
  new Chart(document.getElementById('hrvChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'HRV (ms)',
          data: chronological.map(w => w.hrvOvernight),
          borderColor: '#6c8cff',
          backgroundColor: 'rgba(108,140,255,0.1)',
          tension: 0.3,
          fill: true,
          pointRadius: 4,
          pointBackgroundColor: '#6c8cff',
          yAxisID: 'y'
        },
        {
          label: 'Resting HR',
          data: chronological.map(w => w.restingHR),
          borderColor: '#f87171',
          backgroundColor: 'rgba(248,113,113,0.1)',
          tension: 0.3,
          fill: false,
          pointRadius: 4,
          pointBackgroundColor: '#f87171',
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, position: 'left', title: { display: false } },
        y1: { ...chartDefaults.scales.y, position: 'right', grid: { drawOnChartArea: false } }
      }
    }
  });

  // Sleep
  new Chart(document.getElementById('sleepChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Hours',
          data: chronological.map(w => w.sleepHours),
          backgroundColor: 'rgba(167,139,250,0.6)',
          borderColor: '#a78bfa',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y'
        },
        {
          label: 'Score',
          data: chronological.map(w => w.sleepScore),
          type: 'line',
          borderColor: '#4ade80',
          backgroundColor: 'rgba(74,222,128,0.1)',
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#4ade80',
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, position: 'left', min: 0, max: 12 },
        y1: { ...chartDefaults.scales.y, position: 'right', min: 0, max: 100, grid: { drawOnChartArea: false } }
      }
    }
  });

  // Steps
  new Chart(document.getElementById('stepsChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Steps',
        data: chronological.map(w => w.steps),
        backgroundColor: 'rgba(251,146,60,0.6)',
        borderColor: '#fb923c',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: chartDefaults
  });

  // Activities
  const activities = data.activities || [];
  const actContainer = document.getElementById('activities');
  if (activities.length === 0) {
    actContainer.innerHTML = '<div class="no-data">No recent activities</div>';
    return;
  }

  actContainer.innerHTML = activities.map(a => {
    const typeKey = a.activityType?.typeKey || 'activity';
    const isRun = typeKey === 'running';

    const coreStats = isRun ? `
      <div>
        <div class="activity-stat-label">Distance</div>
        <div class="activity-stat-value">${formatDistance(a.distance)} <span class="stat-unit">km</span></div>
      </div>
      <div>
        <div class="activity-stat-label">Pace</div>
        <div class="activity-stat-value">${formatPace(a.averageSpeed)} <span class="stat-unit">/km</span></div>
      </div>
      <div>
        <div class="activity-stat-label">Avg HR</div>
        <div class="activity-stat-value">${a.averageHR ?? '--'} <span class="stat-unit">bpm</span></div>
      </div>
    ` : `
      <div>
        <div class="activity-stat-label">Duration</div>
        <div class="activity-stat-value">${formatDuration(a.duration)}</div>
      </div>
      <div>
        <div class="activity-stat-label">Avg HR</div>
        <div class="activity-stat-value">${a.averageHR ?? '--'} <span class="stat-unit">bpm</span></div>
      </div>
      <div>
        <div class="activity-stat-label">Calories</div>
        <div class="activity-stat-value">${a.calories ?? '--'}</div>
      </div>
    `;

    let runExtras = '';
    if (isRun) {
      // Fastest Splits
      const splits = [];
      if (a.fastestSplit_1000) splits.push({ label: '1K', val: formatSplitPace(a.fastestSplit_1000) });
      if (a.fastestSplit_1609) splits.push({ label: 'Mile', val: formatSplitPace(a.fastestSplit_1609) });
      if (a.fastestSplit_5000) splits.push({ label: '5K', val: formatSplitPace(a.fastestSplit_5000 / 5) });
      if (a.fastestSplit_10000) splits.push({ label: '10K', val: formatSplitPace(a.fastestSplit_10000 / 10) });
      const splitsHtml = splits.length ? `
        <div class="run-section">
          <div class="run-section-title">Fastest Splits</div>
          <div class="run-grid-4">
            ${splits.map(s => `<div>
              <div class="activity-stat-label">${s.label}</div>
              <div class="activity-stat-value" style="font-size:0.9rem">${s.val}</div>
            </div>`).join('')}
          </div>
        </div>` : '';

      // Running Dynamics
      const dynamics = [];
      if (a.averageRunningCadenceInStepsPerMinute) dynamics.push({ label: 'Cadence', val: Math.round(a.averageRunningCadenceInStepsPerMinute), unit: 'spm' });
      if (a.avgStrideLength) dynamics.push({ label: 'Stride', val: (a.avgStrideLength / 100).toFixed(2), unit: 'm' });
      if (a.avgGroundContactTime) dynamics.push({ label: 'GCT', val: Math.round(a.avgGroundContactTime), unit: 'ms' });
      if (a.avgVerticalOscillation) dynamics.push({ label: 'Vert Osc', val: a.avgVerticalOscillation.toFixed(1), unit: 'cm' });
      const dynamicsHtml = dynamics.length ? `
        <div class="run-section">
          <div class="run-section-title">Running Dynamics</div>
          <div class="run-grid">
            ${dynamics.map(d => `<div>
              <div class="activity-stat-label">${d.label}</div>
              <div class="activity-stat-value" style="font-size:0.9rem">${d.val} <span class="stat-unit">${d.unit}</span></div>
            </div>`).join('')}
          </div>
        </div>` : '';

      // HR Zones
      const hasZones = (a.hrTimeInZone_1 || 0) + (a.hrTimeInZone_2 || 0) + (a.hrTimeInZone_3 || 0) + (a.hrTimeInZone_4 || 0) + (a.hrTimeInZone_5 || 0) > 0;
      const zonesHtml = hasZones ? `
        <div class="run-section">
          <div class="run-section-title">HR Zones</div>
          <div class="hr-zones">${renderHrZones(a)}</div>
        </div>` : '';

      // Training Load & VO2 Max
      const training = [];
      if (a.vO2MaxValue) training.push({ label: 'VO2 Max', val: a.vO2MaxValue, unit: '' });
      if (a.aerobicTrainingEffect) training.push({ label: 'Aerobic TE', val: a.aerobicTrainingEffect.toFixed(1), unit: '' });
      if (a.activityTrainingLoad) training.push({ label: 'Load', val: Math.round(a.activityTrainingLoad), unit: '' });
      if (a.elevationGain) training.push({ label: 'Elev Gain', val: Math.round(a.elevationGain), unit: 'm' });
      if (a.avgPower) training.push({ label: 'Avg Power', val: Math.round(a.avgPower), unit: 'W' });
      if (a.calories) training.push({ label: 'Calories', val: Math.round(a.calories), unit: '' });
      const trainingHtml = training.length ? `
        <div class="run-section">
          <div class="run-section-title">Training</div>
          <div class="run-grid">
            ${training.map(t => `<div>
              <div class="activity-stat-label">${t.label}</div>
              <div class="activity-stat-value" style="font-size:0.9rem">${t.val} <span class="stat-unit">${t.unit}</span></div>
            </div>`).join('')}
          </div>
        </div>` : '';

      runExtras = splitsHtml + dynamicsHtml + zonesHtml + trainingHtml;
    }

    return `
      <div class="activity">
        <div class="activity-header">
          <span class="activity-name">${a.activityName || typeKey}</span>
          <span class="activity-type">${typeKey}</span>
        </div>
        <div class="activity-date">${formatDateTime(a.startTimeLocal)}</div>
        <div class="activity-stats">${coreStats}</div>
        ${runExtras}
      </div>
    `;
  }).join('');
}

init();
</script>
</body>
</html>
